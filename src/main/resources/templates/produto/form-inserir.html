<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto | Cafe Aroma e Sabor</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/forms.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" th:href="@{/home}">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C8872A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
                </svg>
                <span class="logo-text">Cafe Aroma e Sabor</span>
            </a>
            <ul class="navbar-links">
                <li><a th:href="@{/home}">Home</a></li>
                <li><a th:href="@{/produto}" class="active">Produtos</a></li>
                <li><a th:href="@{/estoque}">Estoque</a></li>
                <li><a th:href="@{/usuario}">Usuarios</a></li>
                <li style="display: flex; align-items: center; gap: 16px;">
                    <span style="font-family: var(--font-corpo); font-size: 0.85em; color: var(--texto-suave);" sec:authentication="name">usuario</span>
                    <a th:href="@{/logout}" class="nav-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        Sair
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="container page-form" style="min-height: auto; padding: 40px 0;">
        <section>
            <h2>Novo Produto</h2>
            <form th:action="@{/produto/salvar}" th:object="${produto}" method="post" class="card-form">
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" th:field="*{nome}" placeholder="Ex: Cafe Especial da Casa" required>
                    <span class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
                </div>

                <div class="form-group">
                    <label for="descricao">Descricao</label>
                    <textarea id="descricao" th:field="*{descricao}" placeholder="Descreva o produto" rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="preco">Preco (R$)</label>
                        <input type="number" step="0.01" min="0" id="preco" th:field="*{preco}" placeholder="0.00" required>
                        <span class="error" th:if="${#fields.hasErrors('preco')}" th:errors="*{preco}"></span>
                    </div>
                    <div class="form-group">
                        <label for="quantidadeEstoque">Quantidade em Estoque</label>
                        <input type="number" min="0" id="quantidadeEstoque" th:field="*{quantidadeEstoque}" placeholder="0" required>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                        </svg>
                        Salvar
                    </button>
                    <a th:href="@{/produto}" class="button button-secondary">Cancelar</a>
                </div>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-brand">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C8872A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
                </svg>
                <span>Cafe Aroma e Sabor</span>
            </div>
            <p>&copy; 2026 Cafe Aroma e Sabor &mdash; Todos os direitos reservados</p>
        </div>
    </footer>
</body>
</html>
